# 当前仅做 C# 编译检查 (dotnet build)，确保 Runtime 源码无语法/类型错误。
# TODO: 补充 xUnit 集成测试用例，启用 dotnet test 运行。

name: Test

on:
  push:
  pull_request:
    branches: [master]

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Compile C# package
        run: dotnet build tests/CurlUnity.IntegrationTests/CurlUnity.IntegrationTests.csproj --configuration Release
