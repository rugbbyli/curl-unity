# 运行 xUnit 集成测试套件。
# 测试编译本身覆盖了 Runtime 源码的语法/类型检查，因此不再额外跑 compile-check。
# 当前 macOS runner 跑 ARM64 dylib。后续可加 Windows matrix 扩展覆盖。

name: Test

on:
  push:
  pull_request:
    branches: [master]

jobs:
  integration-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # 需要 Plugins/ 下的 dylib 二进制

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run xUnit integration tests
        run: dotnet test tests/CurlUnity.IntegrationTests/CurlUnity.IntegrationTests.csproj --configuration Release --logger "console;verbosity=normal"
