# 运行 xUnit 集成测试套件 + 收集覆盖率并上传到 Codecov。
# 测试编译本身覆盖了 Runtime 源码的语法/类型检查，因此不再额外跑 compile-check。
# 当前 macOS runner 跑 ARM64 dylib。后续可加 Windows matrix 扩展覆盖。

name: Test

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true   # 需要 Plugins/ 下的 dylib 二进制
          fetch-depth: 0   # Codecov 需要完整 git 历史做 diff coverage 基线对比

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run xUnit unit tests (with coverage)
        run: |
          dotnet test tests/CurlUnity.UnitTests/CurlUnity.UnitTests.csproj \
            --configuration Release \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ${{ github.workspace }}/TestResults/unit

      - name: Run xUnit integration tests (with coverage)
        run: |
          dotnet test tests/CurlUnity.IntegrationTests/CurlUnity.IntegrationTests.csproj \
            --configuration Release \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ${{ github.workspace }}/TestResults/integration

      # Codecov flag 是按 upload 打的标签, 不是按文件。如果一次 upload 同时挂
      # unittests + integrationtests 两个 flag, Codecov 前端按任一 flag 过滤都会
      # 展示同一份 union 后的数据, 失去"拆看"意义。所以分两次 upload, 每次只挂
      # 一个 flag, Codecov 后端各自保存 → 前端可分别切换查看。
      # Codecov 在整体页面会自动把两份 upload 按源文件路径 union, 不会重复计数。
      #
      # fail_ci_if_error: false — 初次接入 Codecov 侧问题不阻塞 test job。
      # 稳定后可收紧为 true。
      - name: Upload unit test coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ github.workspace }}/TestResults/unit/*/coverage.cobertura.xml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload integration test coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ${{ github.workspace }}/TestResults/integration/*/coverage.cobertura.xml
          flags: integrationtests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
