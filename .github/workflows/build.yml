name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ============================================================
  # macOS (ARM64 + x86_64)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            platform: macos-arm64
          - arch: x86_64
            platform: macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get cache key
        id: deps
        run: |
          deps_hash=$(git submodule status | shasum -a 256 | cut -d' ' -f1)
          script_hash=$(shasum -a 256 scripts/build.sh | cut -d' ' -f1)
          echo "hash=${deps_hash}-${script_hash}" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.platform }}/install
          key: ${{ matrix.platform }}-${{ steps.deps.outputs.hash }}

      - name: Build
        run: ./scripts/build.sh ${{ matrix.platform }} > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        run: tail -80 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.platform }}
          path: build.log

      - name: Verify build
        run: |
          cc -arch ${{ matrix.arch }} -o build/verify tests/verify_build.c \
            -Ibuild/${{ matrix.platform }}/install/include \
            -Loutput/macOS/${{ matrix.arch }} -lcurl_unity
          DYLD_LIBRARY_PATH=output/macOS/${{ matrix.arch }} ./build/verify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: output/macOS/${{ matrix.arch }}/libcurl_unity.dylib

  # ============================================================
  # iOS ARM64
  # ============================================================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get cache key
        id: deps
        run: |
          deps_hash=$(git submodule status | shasum -a 256 | cut -d' ' -f1)
          script_hash=$(shasum -a 256 scripts/build.sh | cut -d' ' -f1)
          echo "hash=${deps_hash}-${script_hash}" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/ios-arm64/install
          key: ios-arm64-${{ steps.deps.outputs.hash }}

      - name: Build
        run: ./scripts/build.sh ios-arm64 > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        run: tail -80 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-ios-arm64
          path: build.log

      - name: Verify build (symbol check)
        run: |
          echo "Bridge symbols:"
          nm -gU output/iOS/libcurl_unity.a | grep ' T .*curl_unity_' | sort -u
          count=$(nm -gU output/iOS/libcurl_unity.a | grep -c ' T .*curl_unity_')
          echo "Found $count bridge symbols"
          [ "$count" -ge 10 ] || { echo "FAIL: expected at least 10 bridge symbols"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-arm64
          path: output/iOS/libcurl_unity.a

  # ============================================================
  # Android (arm64 + armv7 + x86_64)
  # ============================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64
            platform: android-arm64
            output: arm64-v8a
          - abi: armv7
            platform: android-armv7
            output: armeabi-v7a
          - abi: x86_64
            platform: android-x86_64
            output: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get cache key
        id: deps
        run: |
          deps_hash=$(git submodule status | sha256sum | cut -d' ' -f1)
          script_hash=$(sha256sum scripts/build.sh | cut -d' ' -f1)
          echo "hash=${deps_hash}-${script_hash}" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.platform }}/install
          key: ${{ matrix.platform }}-${{ steps.deps.outputs.hash }}

      - name: Build
        run: ./scripts/build.sh ${{ matrix.platform }} --android-api 22 > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        run: tail -80 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.platform }}
          path: build.log

      - name: Verify build (symbol check)
        run: |
          echo "Bridge symbols:"
          nm -gD output/Android/${{ matrix.output }}/libcurl_unity.so | grep ' T .*curl_unity_'
          count=$(nm -gD output/Android/${{ matrix.output }}/libcurl_unity.so | grep -c ' T .*curl_unity_')
          echo "Found $count bridge symbols"
          [ "$count" -ge 10 ] || { echo "FAIL: expected at least 10 bridge symbols"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: output/Android/${{ matrix.output }}/libcurl_unity.so

  # ============================================================
  # Windows (x64 + x86)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            platform: windows-x64
            output_arch: x86_64
          - arch: x86
            platform: windows-x86
            output_arch: x86
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install NASM and jom
        run: choco install nasm jom -y --no-progress
        shell: cmd

      - name: Add NASM to PATH
        shell: cmd
        run: echo C:\Program Files\NASM>> %GITHUB_PATH%

      - name: Get cache key
        id: deps
        shell: bash
        run: |
          deps_hash=$(git submodule status | sha256sum | cut -d' ' -f1)
          script_hash=$(sha256sum scripts/build-windows.bat | cut -d' ' -f1)
          echo "hash=${deps_hash}-${script_hash}" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.platform }}/install
          key: ${{ matrix.platform }}-${{ steps.deps.outputs.hash }}

      - name: Build
        shell: cmd
        run: scripts\build-windows.bat > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        shell: cmd
        run: |
          echo === Last 80 lines ===
          powershell -Command "Get-Content build.log -Tail 80"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.platform }}
          path: build.log

      - name: Verify build
        shell: cmd
        run: |
          cl /DCURL_STATICLIB /I"build\${{ matrix.platform }}\install\include" tests\verify_build.c /Fe:verify.exe /link "output\Windows\${{ matrix.output_arch }}\libcurl_unity.lib" || exit /b 1
          copy "output\Windows\${{ matrix.output_arch }}\libcurl_unity.dll" . || exit /b 1
          verify.exe || exit /b 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: output/Windows/${{ matrix.output_arch }}/libcurl_unity.dll

  # ============================================================
  # Publish UPM Package (只在 tag 触发时发布到 upm 分支)
  # ============================================================
  publish-upm:
    name: Publish UPM Package
    needs: [build-macos, build-ios, build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v0.2.0
          VERSION="${TAG#v}"                # e.g. 0.2.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "upm_tag=upm/$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Assemble Plugins
        run: |
          set -euo pipefail
          PKG=Packages/com.basecity.curl-unity
          PLUGINS="$PKG/Runtime/Plugins"

          # macOS — lipo arm64 + x86_64 -> universal
          mkdir -p "$PLUGINS/macOS"
          lipo -create \
            _artifacts/macos-arm64/libcurl_unity.dylib \
            _artifacts/macos-x86_64/libcurl_unity.dylib \
            -output "$PLUGINS/macOS/libcurl_unity.dylib"
          lipo -info "$PLUGINS/macOS/libcurl_unity.dylib"

          # iOS
          mkdir -p "$PLUGINS/iOS"
          cp _artifacts/ios-arm64/libcurl_unity.a "$PLUGINS/iOS/libcurl_unity.a"

          # Android
          mkdir -p "$PLUGINS/Android/arm64-v8a" "$PLUGINS/Android/armeabi-v7a" "$PLUGINS/Android/x86_64"
          cp _artifacts/android-arm64/libcurl_unity.so  "$PLUGINS/Android/arm64-v8a/libcurl_unity.so"
          cp _artifacts/android-armv7/libcurl_unity.so  "$PLUGINS/Android/armeabi-v7a/libcurl_unity.so"
          cp _artifacts/android-x86_64/libcurl_unity.so "$PLUGINS/Android/x86_64/libcurl_unity.so"

          # Windows
          mkdir -p "$PLUGINS/Windows/x86_64" "$PLUGINS/Windows/x86"
          cp _artifacts/windows-x64/libcurl_unity.dll "$PLUGINS/Windows/x86_64/libcurl_unity.dll"
          cp _artifacts/windows-x86/libcurl_unity.dll "$PLUGINS/Windows/x86/libcurl_unity.dll"

          echo "--- Final Plugins layout ---"
          find "$PLUGINS" -type f ! -name '*.meta' | sort

      - name: Update package.json version
        run: |
          set -euo pipefail
          PKG=Packages/com.basecity.curl-unity
          python3 - <<'PY'
          import json, os, pathlib
          version = os.environ["VERSION"]
          p = pathlib.Path("Packages/com.basecity.curl-unity/package.json")
          data = json.loads(p.read_text())
          data["version"] = version
          p.write_text(json.dumps(data, indent=2) + "\n")
          print(p.read_text())
          PY
        env:
          VERSION: ${{ steps.ver.outputs.version }}

      - name: Publish to upm branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          UPM_TAG: ${{ steps.ver.outputs.upm_tag }}
        run: |
          set -euo pipefail
          PKG=Packages/com.basecity.curl-unity

          STAGE="$(mktemp -d)"
          # 平铺 package 内容到根；保留 .meta;排除 .git
          rsync -a --exclude='.git' "$PKG/" "$STAGE/"

          cd "$STAGE"
          git init -q -b upm
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Release $TAG"

          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git remote add origin "$REMOTE"

          # 孤儿分支,force push 覆盖
          git push -f origin upm

          # 为 upm 分支的 commit 打 tag(命名加 upm/ 前缀,避免与 master 的 v* tag 冲突)
          # 用 force 与分支 force push 策略对齐:同一个 v* tag 重发时 tag 也跟随新 commit
          git tag -a "$UPM_TAG" -m "UPM release $TAG"
          git push -f origin "$UPM_TAG"

          echo "Published $UPM_TAG to upm branch"
