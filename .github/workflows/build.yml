name: Build

on:
  push:
    branches: [master]
    paths:
      - 'deps/**'
      - 'bridge/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ============================================================
  # macOS ARM64
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get deps hash
        id: deps
        run: echo "hash=$(git submodule status | shasum -a 256 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/macos-arm64/install
          key: macos-arm64-${{ steps.deps.outputs.hash }}

      - name: Build
        run: ./scripts/build.sh macos-arm64 > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        run: tail -80 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-macos-arm64
          path: build.log

      - name: Verify build
        run: |
          cc -o build/verify tests/verify_build.c \
            -Ibuild/macos-arm64/install/include \
            -Loutput/macOS -lcurl_unity
          DYLD_LIBRARY_PATH=output/macOS ./build/verify

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: output/macOS/libcurl_unity.dylib

  # ============================================================
  # iOS ARM64
  # ============================================================
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get deps hash
        id: deps
        run: echo "hash=$(git submodule status | shasum -a 256 | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/ios-arm64/install
          key: ios-arm64-${{ steps.deps.outputs.hash }}

      - name: Build
        run: ./scripts/build.sh ios-arm64 > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        run: tail -80 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-ios-arm64
          path: build.log

      - name: Verify build (symbol check)
        run: |
          echo "Bridge symbols:"
          nm -gU output/iOS/libcurl_unity.a | grep ' T .*curl_unity_' | sort -u
          count=$(nm -gU output/iOS/libcurl_unity.a | grep -c ' T .*curl_unity_')
          echo "Found $count bridge symbols"
          [ "$count" -ge 10 ] || { echo "FAIL: expected at least 10 bridge symbols"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-arm64
          path: output/iOS/libcurl_unity.a

  # ============================================================
  # Android (arm64 + armv7)
  # ============================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - abi: arm64
            platform: android-arm64
            output: arm64-v8a
          - abi: armv7
            platform: android-armv7
            output: armeabi-v7a
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Get deps hash
        id: deps
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.platform }}/install
          key: ${{ matrix.platform }}-${{ steps.deps.outputs.hash }}

      - name: Build
        run: ./scripts/build.sh ${{ matrix.platform }} --android-api 22 > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        run: tail -80 build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.platform }}
          path: build.log

      - name: Verify build (symbol check)
        run: |
          echo "Bridge symbols:"
          nm -gD output/Android/${{ matrix.output }}/libcurl_unity.so | grep ' T .*curl_unity_'
          count=$(nm -gD output/Android/${{ matrix.output }}/libcurl_unity.so | grep -c ' T .*curl_unity_')
          echo "Found $count bridge symbols"
          [ "$count" -ge 10 ] || { echo "FAIL: expected at least 10 bridge symbols"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: output/Android/${{ matrix.output }}/libcurl_unity.so

  # ============================================================
  # Windows (x64 + x86)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            platform: windows-x64
            output_arch: x86_64
          - arch: x86
            platform: windows-x86
            output_arch: x86
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install NASM and jom
        run: choco install nasm jom -y --no-progress
        shell: cmd

      - name: Add NASM to PATH
        shell: cmd
        run: echo C:\Program Files\NASM>> %GITHUB_PATH%

      - name: Get deps hash
        id: deps
        shell: bash
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: build/${{ matrix.platform }}/install
          key: ${{ matrix.platform }}-${{ steps.deps.outputs.hash }}

      - name: Build
        shell: cmd
        run: scripts\build-windows.bat > build.log 2>&1

      - name: Show errors on failure
        if: failure()
        shell: cmd
        run: |
          echo === Last 80 lines ===
          powershell -Command "Get-Content build.log -Tail 80"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: log-${{ matrix.platform }}
          path: build.log

      - name: Verify build
        shell: cmd
        run: |
          cl /DCURL_STATICLIB /I"build\${{ matrix.platform }}\install\include" tests\verify_build.c /Fe:verify.exe /link "output\Windows\${{ matrix.output_arch }}\libcurl_unity.lib"
          copy "output\Windows\${{ matrix.output_arch }}\libcurl_unity.dll" .
          verify.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: output/Windows/${{ matrix.output_arch }}/libcurl_unity.dll
